name: Download HuggingFace Model to Release

# 手动触发：下载指定 HF 模型并上传到 GitHub Release
# 使用前请在仓库 Settings → Secrets 中配置 HF_TOKEN（HuggingFace Access Token）
# 注意：GitHub 单个 release 资产上限为 2GB，本工作流支持自动分片大于 1.9GB 的文件

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "HuggingFace 模型 ID（例如 bert-base-uncased / meta-llama/Llama-3.2-1B）"
        required: true
        type: string
      revision:
        description: "分支/版本（默认 main）"
        required: false
        default: "main"
        type: string
      file_pattern:
        description: "文件 glob 过滤（默认 *，例如 *.safetensors）"
        required: false
        default: "*"
        type: string
      release_tag:
        description: "目标 Release tag（不存在则创建）"
        required: true
        type: string
      make_latest:
        description: "是否设为最新 release"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      split_large_files:
        description: "自动分片 >1.9GB 的文件（分片后可用 cat 合并）"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

env:
  HF_HOME: ${{ github.workspace }}/hf_cache
  HF_XET_HIGH_PERFORMANCE: "1"

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install -U "huggingface_hub[cli]"

      - name: Download model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "::group::Downloading ${{ inputs.model_id }} @ ${{ inputs.revision }}"
          hf download "${{ inputs.model_id }}" \
            --revision "${{ inputs.revision }}" \
            --include "${{ inputs.file_pattern }}" \
            --local-dir ./model
          echo "::endgroup::"

      - name: Verify download
        run: |
          echo "Downloaded files:"
          find ./model -type f -exec ls -lh {} \;

      - name: Prepare upload directory
        run: |
          mkdir -p ./upload
          # 生成清单
          {
            echo "model_id: ${{ inputs.model_id }}"
            echo "revision: ${{ inputs.revision }}"
            echo "downloaded_at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "files:"
          } > ./upload/MANIFEST.txt
          (cd ./model && find . -type f -exec sh -c 'echo "  $1: $(sha256sum "$1" | cut -d" " -f1) ($(stat -c%s "$1") bytes)"' _ {} \;) >> ./upload/MANIFEST.txt

      - name: Split large files (>1.9GB)
        if: inputs.split_large_files == 'true'
        run: |
          cd ./model
          find . -type f | while read -r f; do
            rel="${f#./}"
            size=$(stat -c%s "$f")
            mkdir -p "../upload/$(dirname "$rel")"
            if [ "$size" -gt 1900000000 ]; then
              echo "Splitting $rel ($size bytes)"
              # 删除原文件占位，使用数字后缀分片
              split -b 1900M -d -a 3 "$f" "../upload/$rel.part-"
              echo "split: $rel -> $rel.part-*" >> ../upload/SPLIT_INFO.txt
            else
              cp "$f" "../upload/$rel"
            fi
          done

      - name: Copy files as-is (no split)
        if: inputs.split_large_files == 'false'
        run: |
          # 校验是否超出 2GB 上限
          over=$(find ./model -type f -size +2G | wc -l)
          if [ "$over" -gt 0 ]; then
            echo "::error::发现 $over 个文件超过 2GB，请开启 split_large_files 或缩小 file_pattern"
            find ./model -type f -size +2G
            exit 1
          fi
          cp -r ./model/. ./upload/

      - name: List upload contents
        run: find ./upload -type f -exec ls -lh {} \;

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: "${{ inputs.model_id }} @ ${{ inputs.revision }}"
          body: |
            ## HuggingFace Model

            - **Model**: `${{ inputs.model_id }}`
            - **Revision**: `${{ inputs.revision }}`
            - **File pattern**: `${{ inputs.file_pattern }}`

            详见 `MANIFEST.txt`（含 SHA256 校验）。
            如使用了分片（split_large_files），可用以下命令合并：
            ```bash
            cat model.safetensors.part-* > model.safetensors
            ```
          files: upload/**
          make_latest: ${{ inputs.make_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf ./model ./upload ./hf_cache || true
