name: Sync Homebrew API JSON

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 * * * *'  # 每小时自动运行
  push:
    branches:
      - main
    paths:
      - '.github/workflows/download-and-release.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cask.jws.json
        run: |
          curl -L -o cask.jws.json "https://formulae.brew.sh/api/cask.jws.json"
          echo "Downloaded cask.jws.json size: $(wc -c < cask.jws.json) bytes"

      - name: Download formula.jws.json
        run: |
          curl -L -o formula.jws.json "https://formulae.brew.sh/api/formula.jws.json"
          echo "Downloaded formula.jws.json size: $(wc -c < formula.jws.json) bytes"
          
      - name: Download packages.arm64_tahoe.jws.json
        run: |
          curl -L -o packages.arm64_tahoe.jws.json "https://formulae.brew.sh/api/internal/packages.arm64_tahoe.jws.json"
          echo "Downloaded packages.arm64_tahoe.jws.json size: $(wc -c < packages.arm64_tahoe.jws.json) bytes"

      - name: Download ACL4SSR_Online_Full.ini & rewrite ruleset URLs to jsDelivr CDN
        run: |
          # 1) 下载源文件（jsDelivr CDN 优先，raw 回退）
          URL_CDN="https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/config/ACL4SSR_Online_Full.ini"
          URL_RAW="https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full.ini"
          if curl -fsSL -o ACL4SSR_Online_Full.ini "$URL_CDN"; then
            echo "Downloaded via jsDelivr CDN"
          else
            echo "jsDelivr failed, falling back to raw.githubusercontent.com"
            curl -fsSL -o ACL4SSR_Online_Full.ini "$URL_RAW"
          fi
          # 2) 把文件内 ruleset 链接从 raw 改写为 jsDelivr CDN（客户端拉规则走加速）
          #    raw.githubusercontent.com/USER/REPO/BRANCH/PATH -> cdn.jsdelivr.net/gh/USER/REPO@BRANCH/PATH
          #    注：perl 替换里 @ 必须写成 \@，否则 @$3 会被当成数组解引用
          perl -i -pe 's|raw\.githubusercontent\.com/([^/]+)/([^/]+)/([^/]+)/|cdn.jsdelivr.net/gh/$1/$2\@$3/|g' ACL4SSR_Online_Full.ini
          echo "Processed ACL4SSR_Online_Full.ini size: $(wc -c < ACL4SSR_Online_Full.ini) bytes"
          echo "--- remaining raw URLs (should be none) ---"
          grep -n 'raw.githubusercontent.com' ACL4SSR_Online_Full.ini || echo "none"

      - name: Delete previous latest release
        continue-on-error: true  # 首次运行时还没有 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes

      - name: Upload files to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            cask.jws.json \
            formula.jws.json \
            packages.arm64_tahoe.jws.json \
            ACL4SSR_Online_Full.ini \
            --title "Homebrew API JSON" \
            --notes "Auto-generated Homebrew API JSON snapshot." \
            --latest
