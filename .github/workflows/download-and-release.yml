name: Sync Homebrew API JSON

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 * * * *'  # 每小时自动运行
  push:
    branches:
      - main
    paths:
      - '.github/workflows/download-and-release.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download cask.jws.json
        run: |
          curl -L -o cask.jws.json "https://formulae.brew.sh/api/cask.jws.json"
          echo "Downloaded cask.jws.json size: $(wc -c < cask.jws.json) bytes"

      - name: Download formula.jws.json
        run: |
          curl -L -o formula.jws.json "https://formulae.brew.sh/api/formula.jws.json"
          echo "Downloaded formula.jws.json size: $(wc -c < formula.jws.json) bytes"
          
      - name: Download packages.arm64_tahoe.jws.json
        run: |
          curl -L -o packages.arm64_tahoe.jws.json "https://formulae.brew.sh/api/internal/packages.arm64_tahoe.jws.json"
          echo "Downloaded packages.arm64_tahoe.jws.json size: $(wc -c < packages.arm64_tahoe.jws.json) bytes"

      - name: Delete previous latest release
        continue-on-error: true  # 首次运行时还没有 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --cleanup-tag --yes

      - name: Upload files to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            cask.jws.json \
            formula.jws.json \
            packages.arm64_tahoe.jws.json \
            --title "Homebrew API JSON" \
            --notes "Auto-generated Homebrew API JSON snapshot." \
            --latest
